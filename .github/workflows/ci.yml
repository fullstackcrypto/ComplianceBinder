name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: .
      ENV: ci
      DATABASE_URL: sqlite:///./compliancebinder_test.db
      UPLOAD_DIR: ./test_uploads
      SECRET_KEY: test-secret-key-for-ci-only
      ALLOWED_ORIGINS: '*'
      PUBLIC_APP_URL: http://localhost:8000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate non-deployed CI config
        run: |
          python scripts/validate_launch_config.py

      - name: Run Alembic migration check
        run: |
          rm -f compliancebinder_test.db
          python -m alembic upgrade head

      - name: Run tests
        run: |
          python -m pytest -q
