services:
  - type: web
    name: inspectionbinder-staging
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements-dev.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: staging
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: inspectionbinder-staging-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_SETUP
        sync: false
      - key: REMINDER_CRON_SECRET
        sync: false
      - key: REMINDER_WINDOW_DAYS
        value: "7"
      - key: REMINDER_FROM_EMAIL
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_KEY
        sync: false
      - key: MAIL_USE_TLS
        value: "true"

databases:
  - name: inspectionbinder-staging-db
    plan: starter
